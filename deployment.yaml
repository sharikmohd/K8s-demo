apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx-demo
        image: mohdsharik/k8s-demo:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 80